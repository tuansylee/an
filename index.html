<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f1115">
<meta name="robots" content="noindex,nofollow">
<title>Gia đình</title>
<style>
:root{--bg:#0f1115;--card:#1a1d24;--fg:#e9edf3;--mut:#9aa0aa;--bd:#2a2f3a;
  --r:#ff5a5a;--o:#ffa53a;--y:#ffd84d;--g:#5fd08a;--blue:#3f6fd0;--pink:#c0407f;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
[hidden]{display:none!important}
body{margin:0;background:var(--bg);color:var(--fg);font:16px/1.45 system-ui,"Segoe UI",Roboto,sans-serif;
  padding:14px;max-width:1040px;margin:0 auto;user-select:none}
h2{font-size:13px;letter-spacing:.08em;color:var(--mut);margin:16px 4px 8px;text-transform:uppercase}
.bar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:2px 4px 10px;
  padding:10px 14px;background:var(--card);border:1px solid var(--bd);border-radius:14px}
.bar .d{font-size:22px;font-weight:800}.bar .t{font-size:13px;color:var(--mut)}
.lang button{background:#222733;border:1px solid var(--bd);color:var(--mut);padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer}
.lang button.on{background:var(--g);color:#06210f;border-color:var(--g);font-weight:700}
.mockbanner{background:#2a2410;border:1px solid #6a5520;color:#ffd98a;border-radius:10px;padding:8px 12px;font-size:13px;margin:0 4px 10px}
.tabs{display:flex;gap:6px;margin:0 4px 12px;position:sticky;top:0;background:var(--bg);padding:6px 0;z-index:10}
.tabs button{flex:1;background:var(--card);border:1px solid var(--bd);color:var(--mut);padding:11px 4px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;line-height:1.2}
.tabs button.on{background:#1d2740;border-color:var(--blue);color:var(--fg)}
.page{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:820px){.page{grid-template-columns:1fr 1fr;gap:22px;align-items:start}}
.today{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cell{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;position:relative}
.cell .ca{font-size:12px;color:var(--mut);letter-spacing:.06em}
.cell .who{font-size:24px;font-weight:800;margin-top:4px}
.bo{background:linear-gradient(155deg,#2a5fd0,#16233a);border-color:var(--blue)}
.me{background:linear-gradient(155deg,#c0407f,#2a1622);border-color:var(--pink)}
.lk{position:absolute;top:5px;right:7px;font-size:12px}
.cell.locked{outline:2px solid #ffd84d88}
@keyframes nope{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.nope{animation:nope .28s}
table{width:100%;border-collapse:separate;border-spacing:5px;margin-top:4px}
th{font-size:11px;color:var(--mut);font-weight:600}th.now{color:var(--fg)}th .dn{display:block;font-size:10px;color:var(--mut)}
td{text-align:center;border-radius:9px;padding:11px 2px;font-size:20px;cursor:pointer;border:1px solid var(--bd);background:var(--card);position:relative}
td.now{outline:2px solid #7da7ff77}.lab{font-size:11px;color:var(--mut);text-align:right;padding-right:4px}
.tdlk{position:absolute;top:0;right:2px;font-size:9px}
.tally{font-size:13px;color:var(--mut);margin:8px 4px}.tally b{color:var(--fg)}
.legend{font-size:12px;color:var(--mut);margin:4px 4px}
.wknav{display:flex;gap:8px;align-items:center;margin:2px 4px 6px}
.wknav button{background:#222733;border:1px solid var(--bd);color:var(--fg);border-radius:9px;padding:9px 12px;font-size:14px;font-weight:700;cursor:pointer}
.wknav #wkLabel{flex:1;color:var(--mut)}
.chk{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:11px 12px;margin:7px 0;cursor:pointer}
.chk .box{width:24px;height:24px;border-radius:7px;border:2px solid var(--mut);flex:none;display:flex;align-items:center;justify-content:center;font-size:15px}
.chk.done .box{background:var(--g);border-color:var(--g);color:#06210f}
.chk .nm{flex:1;font-size:16px}.chk.done .nm{text-decoration:line-through;color:var(--mut)}
.chk .ic{min-width:38px;text-align:center;color:var(--mut);font-size:15px}
.add{width:100%;margin:8px 0 2px;background:#16241a;border:1px dashed #3a5a40;color:#9fe0b0;padding:12px;border-radius:12px;font-size:14px;cursor:pointer}
.empty{color:var(--mut);font-size:14px;margin:8px 4px;text-align:center}
/* việc định kỳ */
.chore{display:flex;align-items:center;gap:10px;background:linear-gradient(155deg,#2a2410,#1a1d24);border:1px solid #6a5520;border-radius:12px;padding:12px;margin:7px 0;cursor:pointer}
.chore .box{width:26px;height:26px;border-radius:50%;border:2px solid var(--o);flex:none;display:flex;align-items:center;justify-content:center;color:var(--o);font-size:18px}
.chore .nm{flex:1;font-size:15px;font-weight:600}.chore .sub{font-size:12px;color:var(--mut);margin-top:2px;font-weight:400}
.chore.t2{background:linear-gradient(155deg,#23262e,#191b20);border-color:#3a3f4a}
.chore.t2 .box{border-color:var(--mut);color:var(--mut)}.chore.t2 .nm{font-weight:500;font-size:14px}
.t2lbl{font-size:11px;color:var(--mut);letter-spacing:.06em;text-transform:uppercase;margin:12px 4px 2px}
.ic{display:inline-flex;align-items:center;justify-content:center;min-width:40px;min-height:40px;color:var(--mut);font-size:16px;cursor:pointer;flex:none}
/* lịch bác sĩ */
.dl{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--bd);border-left-width:5px;border-radius:12px;padding:10px 12px;margin:8px 0}
.dl .ttl{flex:1;font-size:15px}.dl .when{font-size:13px;color:#c7ccd6;margin-top:2px}.dl .cd{font-size:14px;font-weight:800;white-space:nowrap}
.dl.pbo{border-left-color:var(--blue)}.dl.pme{border-left-color:var(--pink)}.dl.pan{border-left-color:var(--g)}.dl.pall{border-left-color:var(--y)}
.dl.late{box-shadow:inset 0 0 0 1px var(--r)}
.dl .box{width:28px;height:28px;border-radius:50%;border:2px solid #ffffffaa;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;cursor:pointer}
.dl .ic2{display:inline-flex;align-items:center;justify-content:center;min-width:40px;cursor:pointer;font-size:20px}
.addform{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:12px;margin-top:8px;display:flex;flex-direction:column;gap:8px}
.addform input,.addform select{background:#0c0e12;border:1px solid var(--bd);color:var(--fg);padding:11px;border-radius:9px;font-size:15px;width:100%}
.addform .frow{display:flex;gap:8px}.addform .frow>*{flex:1}
.addform .fsave{background:var(--g);color:#06210f;border:0;font-weight:700;padding:11px;border-radius:9px;font-size:14px;cursor:pointer}
.addform .fghost{background:#222733;color:var(--mut);border:0;font-weight:700;padding:11px;border-radius:9px;font-size:14px;cursor:pointer}
.hbtns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.hbtn{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px 6px;text-align:center;cursor:pointer;font-weight:700}
.hbtn .e{font-size:30px;display:block;margin-bottom:4px}
.hbtn.pain{border-color:#c0407f55}.hbtn.nose{border-color:#ff5a5a55}.hbtn.mood{border-color:#5fd08a55}
.hist{font-size:13px;color:#c7ccd6;background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:6px 12px;margin-top:6px}
.hist .row{padding:6px 0;border-top:1px solid var(--bd)}.hist .row:first-child{border-top:0}
.report{width:100%;background:#16241a;border:1px solid #3a5a40;color:#bfe9cc;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer}
.gamebox{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:16px}
.bignum{font-size:54px;font-weight:800;text-align:center;line-height:1}.bignum.gold{color:var(--y)}
.gunit{text-align:center;color:var(--mut);font-size:14px;margin-bottom:6px}
.gbreak{text-align:center;color:var(--mut);font-size:12px;margin-bottom:8px}
.done{text-align:center;color:var(--g);font-weight:700;margin-bottom:6px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.gbtn{border:0;border-radius:9px;padding:10px 2px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;line-height:1.25}
.g_cn{background:#16a34a}.g_n{background:#65a30d}.g_bt{background:#64748b}.g_h{background:#ea580c}.g_ch{background:#dc2626}
.gbtn.sel{outline:3px solid #fff;outline-offset:1px}
.gstatus{font-size:12px;color:var(--mut);text-align:center;margin-top:8px}
.critbtn{width:100%;margin-top:10px;background:#222733;border:1px solid var(--bd);color:var(--mut);padding:10px;border-radius:9px;font-size:13px;cursor:pointer}
.gumbtn{width:100%;margin-top:8px;border:0;border-radius:10px;padding:13px;font-size:14px;font-weight:700;cursor:pointer}
.gumbtn.indigo{background:#4f46e5;color:#fff}.gumbtn.gold2{background:#d97706;color:#fff}.gumbtn.ghost{background:#222733;color:var(--mut)}
#ov{position:fixed;inset:0;background:#000a;display:flex;align-items:flex-end;justify-content:center;z-index:50}
@media(min-width:600px){#ov{align-items:center}}
.sheet{background:var(--card);border:1px solid var(--bd);border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:90vh;overflow:auto;padding:18px}
@media(min-width:600px){.sheet{border-radius:18px}}
.sheet h3{margin:0 0 12px;font-size:18px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 14px}
.chip{background:#0c0e12;border:1px solid var(--bd);color:var(--fg);padding:9px 13px;border-radius:20px;font-size:14px;cursor:pointer}
.chip.sel{background:var(--g);color:#06210f;border-color:var(--g);font-weight:700}
.lbl{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin:4px 0 2px}
.sheet textarea{width:100%;background:#0c0e12;border:1px solid var(--bd);color:var(--fg);border-radius:9px;padding:10px;font:14px/1.4 system-ui;margin-top:6px}
.sheet input{width:100%;background:#0c0e12;border:1px solid var(--bd);color:var(--fg);border-radius:9px;padding:11px;font-size:16px;margin-top:4px}
.sheet .acts{display:flex;gap:8px;margin-top:14px}
.sheet .acts button{flex:1;padding:13px;border-radius:10px;border:0;font-weight:700;font-size:15px;cursor:pointer}
.save{background:var(--g);color:#06210f}.cancel{background:#222733;color:var(--mut)}
.notebtn{background:#0c0e12;border:1px dashed var(--bd);color:var(--mut);padding:9px;border-radius:9px;width:100%;cursor:pointer;font-size:13px;margin-top:4px}
.rep th,.rep td{border:1px solid var(--bd);padding:6px 8px;text-align:left;font-size:13px}
.bars{display:flex;align-items:flex-end;gap:6px;height:90px;margin:10px 0 22px;border-bottom:1px solid var(--bd);padding-bottom:2px}
.bars .b{flex:1;background:var(--blue);border-radius:4px 4px 0 0;min-height:3px;position:relative}
.bars .b span{position:absolute;bottom:-18px;left:0;right:0;text-align:center;font-size:10px;color:var(--mut)}
.foot{margin:22px 4px;color:var(--mut);font-size:12px;text-align:center}
#printArea{display:none}
@media print{
  body{background:#fff;color:#000;padding:0;max-width:none}
  body>*{display:none!important}
  #printArea{display:block!important;color:#000;font:13px/1.4 system-ui}
  #printArea h1{font-size:20px;margin:0 0 2px}
  #printArea h3{font-size:14px;margin:14px 0 4px}
  #printArea table{width:100%;border-collapse:collapse;margin:4px 0 12px}
  #printArea th,#printArea td{border:1px solid #999;padding:5px 8px;text-align:left;font-size:12px;color:#000}
  @page{size:A4;margin:16mm}
}
</style>
</head>
<body>

<div class="bar">
  <div><div class="d" id="dateLbl"></div><div class="t" id="weekLbl"></div></div>
  <div class="lang"><button data-lang="vi" class="on">VI</button><button data-lang="de">DE</button><button id="cog">⚙️</button></div>
</div>
<div class="mockbanner" id="backupReminder" hidden style="cursor:pointer;background:#1a2a16;border-color:#3a5a40;color:#9fe0b0"></div>
<div class="mockbanner" id="acariReminder" hidden style="cursor:pointer"></div>

<div class="tabs">
  <button data-tab="truc" id="tab_truc"></button>
  <button data-tab="lich" id="tab_lich"></button>
  <button data-tab="con" id="tab_con"></button>
  <button data-tab="health" id="tab_health"></button>
</div>

<!-- ===== TAB: TRỰC + việc hằng ngày ===== -->
<div class="panel" data-panel="truc">
 <div class="page">
  <div class="col">
   <h2 id="h_today"></h2><div class="today" id="todayCard"></div>
   <h2 id="h_week"></h2>
   <div class="wknav"><button data-wkrel="-1">◀</button><button id="wkLabel"></button><button data-wkrel="1">▶</button></div>
   <table id="weekGrid"></table>
   <div class="tally" id="tally"></div><div class="legend" id="legend"></div>
  </div>
  <div class="col">
   <h2 id="h_daily"></h2><div id="dailyList"></div><button class="add" id="addDaily"></button>
  </div>
 </div>
</div>

<!-- ===== TAB: ĐỊNH KỲ & KHÁM ===== -->
<div class="panel" data-panel="lich" hidden>
 <div class="page">
  <div class="col">
   <h2 id="h_chores"></h2><div id="choreList"></div><button class="add" id="choreMng"></button>
  </div>
  <div class="col">
   <h2 id="h_appt"></h2><div id="apptList"></div>
   <button class="add" id="addAppt"></button>
   <div class="addform" id="apptForm" hidden>
     <input id="evT" placeholder="">
     <div class="frow"><input id="evD" type="date"><select id="evP"></select></div>
     <div class="frow"><button class="fsave" id="evSave"></button><button class="fghost" id="evCancel"></button></div>
   </div>
  </div>
 </div>
</div>

<!-- ===== TAB: THƯỞNG PHẠT ===== -->
<div class="panel" data-panel="con" hidden>
 <div class="page">
  <div class="col">
   <h2 id="h_game"></h2>
   <div class="gamebox">
     <div class="bignum" id="gameDays">–</div><div class="gunit" id="gameUnit"></div>
     <div class="gbreak" id="gameBreak"></div><div class="done" id="doneMsg" style="display:none"></div>
     <div class="grid5" id="gameBtns"></div><div class="gstatus" id="gameStatus"></div>
     <button class="critbtn" id="critBtn"></button>
     <button class="gumbtn ghost" id="gSetDays"></button>
   </div>
  </div>
  <div class="col">
   <h2 id="h_gum"></h2>
   <div class="gamebox">
     <div class="bignum gold" id="gumNum">–</div><div class="gunit" id="gumUnit"></div>
     <button class="gumbtn indigo" id="gTest"></button>
     <button class="gumbtn gold2" id="gKonig"></button>
     <div style="display:flex;gap:8px;margin-top:8px">
       <button class="gumbtn ghost" id="gPlus" style="margin:0;flex:1"></button>
       <button class="gumbtn ghost" id="gMinus" style="margin:0;flex:1"></button>
     </div>
     <button class="gumbtn ghost" id="gPay"></button>
     <button class="gumbtn ghost" id="gSetGum"></button>
     <div class="lbl" id="gumLogT" style="margin-top:12px"></div>
     <div class="hist" id="gumLog"></div>
   </div>
  </div>
 </div>
</div>

<!-- ===== TAB: SỨC KHỎE ===== -->
<div class="panel" data-panel="health" hidden>
 <div class="page">
  <div class="col">
   <h2 id="h_health"></h2>
   <div class="hbtns">
     <div class="hbtn pain" data-h="pain"><span class="e">🤕</span><span id="b_pain"></span></div>
     <div class="hbtn nose" data-h="nose"><span class="e">🩸</span><span id="b_nose"></span></div>
     <div class="hbtn mood" data-h="mood"><span class="e">🙂</span><span id="b_mood"></span></div>
   </div>
   <div class="hist" id="healthHist"></div>
   <h2 id="h_sleep"></h2><div class="hist" id="sleepList"></div><button class="add" id="addSleep"></button>
   <h2 id="h_temp"></h2><div class="hist" id="tempList"></div><button class="add" id="addTemp"></button>
  </div>
  <div class="col">
   <h2 id="h_acari"></h2>
   <div class="gamebox">
     <div class="bignum" id="acariDays" style="font-size:42px">–</div>
     <div class="gunit" id="acariUnit"></div>
     <div class="gbreak" id="acariBreak"></div>
     <button class="gumbtn ghost" id="acariBuy" style="margin-top:6px"></button>
   </div>
   <h2 id="h_growth"></h2><div class="hist" id="growthList"></div><button class="add" id="addGrowth"></button>
   <h2 id="h_report"></h2><button class="report" id="repBtn"></button>
  </div>
 </div>
</div>

<div class="foot" id="footNote"></div>
<div id="ov" hidden><div class="sheet" id="sheet"></div></div>
<div id="printArea"></div>
<input id="impFile" type="file" accept="application/json" hidden>

<script>
/* ============ i18n ============ */
let LANG=localStorage.getItem("fam.lang")||"vi";
const T={
 vi:{ tab_truc:"🗓️ Trực", tab_lich:"📋 Định kỳ & Khám", tab_con:"🎮 Thưởng phạt", tab_health:"🩺 Sức khỏe",
   today:"Hôm nay trực", week:"Tuần này — chạm: đổi ca · ca đã qua tự khoá 🔒 · giữ 0.5s: khoá/mở",
   daily:"Việc hằng ngày của", chores:"🧺 Việc định kỳ tới hạn", health:"🩺 Sức khỏe",
   appt:"⏰ Lịch bác sĩ & deadline", report:"Báo cáo cho bác sĩ", repBtn:"📄 Xuất báo cáo bác sĩ (tiếng Đức)",
   addDaily:"＋ Thêm việc hằng ngày", pain:"Đau", nose:"Chảy máu mũi", mood:"Cảm xúc",
   weekA:"Tuần A", weekB:"Tuần B", bo:"Bố", me:"Mẹ", sang:"SÁNG", chieu:"CHIỀU", childDefault:"Con",
   tally:t=>`Tuần này: <b>👨 Bố ${t.bo} ca</b> · <b>👩 Mẹ ${t.me} ca</b>`,
   legend:"Xoay mặc định 2 tuần (cân 7/7) · cuối tuần T7=Bố, CN=Mẹ · chạm: đổi ca · ca đã qua tự khoá · giữ 0.5s: khoá/mở",
   foot:"Local-only trên thiết bị này · sao lưu bằng ⚙️ · không đồng bộ, không đăng nhập",
   bodyparts:["Đầu","Bụng","Tai","Họng","Răng","Chân","Tay","Khác"],
   level:"Mức độ", amount:"Lượng", duration:"Bao lâu mới hết", side:"Bên", part:"Bộ phận",
   amounts:["Ít","Vừa","Nhiều"], sides:["Trái","Phải","Cả hai"],
   moods:["😀 Rất vui","🙂 Ổn","😐 Bình thường","😟 Buồn","😣 Khó chịu"],
   addnote:"＋ Thêm ghi chú", save:"Lưu", cancel:"Huỷ", notePh:"Ghi chú (nếu cần)…",
   nohist:"Chưa có bản ghi hôm nay.", reportTitle:"Gesundheitsbericht",
   game:"🎮 Cấm chơi game", gameUnit:"ngày còn lại", gum:"🍬 Kẹo cao su đang nợ", gumUnit:"cái kẹo",
   ratings:[["cn","Cực ngoan","−2"],["n","Ngoan","−1"],["bt","Bình thường","0"],["h","Hư","+1"],["ch","Cực hư","+2"]],
   gameStatus:r=>r?`Hôm nay đã chấm: ${r} — bấm lại để đổi`:"Chưa chấm điểm hôm nay.",
   gbreak:(i,e,m)=>`Bắt đầu ${i} − đã trôi qua ${e} ${m<0?'−':'+'} điểm ${Math.abs(m)}`,
   gNotSet:"Chưa thiết lập — bấm '⚙️ Đặt số ngày cấm'",
   critBtn:"❓ Tiêu chí chấm điểm", critTitle:"Tiêu chí chấm điểm", done:"🎉 Hết hạn phạt!",
   gTest:"📝 Đúng hết bài kiểm tra (+2)", gKonig:"👑 König / nhất lớp (+10)", gPay:"🍬 Đã đưa kẹo (trừ)",
   gPlus:"＋ Cộng", gMinus:"－ Trừ", gReasonTest:"Đúng hết bài kiểm tra", gReasonKonig:"König / nhất lớp",

const L=()=>T[LANG];
const $=id=>document.getElementById(id);
const iso=d=>{const x=new Date(d);return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");};
const dmy=d=>d.split("-").reverse().slice(0,2).join("/");
const ld=k=>{try{return JSON.parse(localStorage.getItem(k))||[]}catch(e){return[]}};
const sv=(k,a)=>localStorage.setItem(k,JSON.stringify(a));
const CHILD=()=>localStorage.getItem("fam.childname")||L().childDefault;

let TAB=localStorage.getItem("fam.tab")||"truc";
function setTab(t){TAB=t;localStorage.setItem("fam.tab",t);
  document.querySelectorAll(".panel").forEach(p=>p.hidden=p.dataset.panel!==t);
  document.querySelectorAll("[data-tab]").forEach(b=>b.classList.toggle("on",b.dataset.tab===t));}
document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>setTab(b.dataset.tab));

/* ============ Lịch trực (thuật toán 2 tuần, plan mục 4) ============ */
const PEOPLE={bo:{c:"bo",e:"🧔"},me:{c:"me",e:"👩‍🦰"}};
const DAYN=["CN","T2","T3","T4","T5","T6","T7"];
const TEMPLATE=[
 { 0:{sang:"me",chieu:"me"},1:{sang:"bo",chieu:"me"},2:{sang:"bo",chieu:"me"},
   3:{sang:"me",chieu:"bo"},4:{sang:"bo",chieu:"bo"},5:{sang:"me",chieu:"me"},6:{sang:"bo",chieu:"bo"} },
 { 0:{sang:"me",chieu:"me"},1:{sang:"me",chieu:"bo"},2:{sang:"bo",chieu:"me"},
   3:{sang:"me",chieu:"bo"},4:{sang:"bo",chieu:"bo"},5:{sang:"me",chieu:"me"},6:{sang:"bo",chieu:"bo"} }];
const SHIFTS=[{k:"sang"},{k:"chieu"}];
function mondayOf(d){const x=new Date(d);const wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);x.setHours(0,0,0,0);return x;}
const EPOCH=mondayOf(new Date(2026,5,15));
function weekParity(d){return ((Math.round((mondayOf(d)-EPOCH)/(7*864e5))%2)+2)%2;}
const baseOwner=(d,sk)=>TEMPLATE[weekParity(d)][d.getDay()][sk];
let weekOffset=0;
function dispMon(){const m=mondayOf(new Date());m.setDate(m.getDate()+weekOffset*7);return m;}
const ovKey=(d,sk)=>"fam.ov."+iso(d)+"|"+sk, lkKey=(d,sk)=>"fam.lk."+iso(d)+"|"+sk;
const owner=(d,sk)=>localStorage.getItem(ovKey(d,sk))||baseOwner(d,sk);
// Ca đã qua = TỰ KHOÁ. Sáng hết 13:00, Chiều hết cuối ngày (24:00).
const SANG_END_HOUR=13;
function slotPast(d,sk){const end=new Date(d);end.setHours(sk==="sang"?SANG_END_HOUR:24,0,0,0);return new Date()>end;}
function isLocked(d,sk){const v=localStorage.getItem(lkKey(d,sk));
  if(v==="1")return true;if(v==="0")return false;return slotPast(d,sk);}   // mặc định: ca đã qua = khoá
function toggle(d,sk){if(isLocked(d,sk))return;const other=owner(d,sk)==="bo"?"me":"bo";
  if(other===baseOwner(d,sk))localStorage.removeItem(ovKey(d,sk));else localStorage.setItem(ovKey(d,sk),other);renderDuty();}
function toggleLock(d,sk){const next=!isLocked(d,sk),def=slotPast(d,sk);   // giữ 0.5s: khoá/mở (mở lại được cả ca đã qua)
  if(next===def)localStorage.removeItem(lkKey(d,sk));else localStorage.setItem(lkKey(d,sk),next?"1":"0");renderDuty();}
function cellHtml(d,sk){const o=owner(d,sk),p=PEOPLE[o];
  return `<div class="cell ${p.c}${isLocked(d,sk)?' locked':''}" data-d="${iso(d)}" data-s="${sk}">
    ${isLocked(d,sk)?'<span class="lk">🔒</span>':''}
    <div class="ca">${sk==="sang"?L().sang:L().chieu}</div>
    <div class="who">${p.e} ${o==="bo"?L().bo:L().me}</div></div>`;}
function renderDuty(){
  const now=new Date();
  $("dateLbl").textContent=DAYN[now.getDay()]+" · "+iso(now).split("-").reverse().join("/");
  $("weekLbl").textContent=(weekParity(now)===0?L().weekA:L().weekB);
  $("todayCard").innerHTML=SHIFTS.map(s=>cellHtml(now,s.k)).join("");
  const mon=dispMon();const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  $("wkLabel").textContent=(weekParity(mon)===0?L().weekA:L().weekB)+" · "+mon.getDate()+"/"+(mon.getMonth()+1)+"–"+sun.getDate()+"/"+(sun.getMonth()+1)+(weekOffset?(weekOffset>0?" ▶":" ◀"):"");
  let head="<tr><th></th>";
  let rows=SHIFTS.map(s=>`<tr><td class="lab">${s.k==="sang"?L().sang:L().chieu}</td>`);
  const tal={bo:0,me:0};
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);const nowD=iso(d)===iso(now);
    head+=`<th class="${nowD?'now':''}">${DAYN[d.getDay()]}<span class="dn">${d.getDate()}/${d.getMonth()+1}</span></th>`;
    SHIFTS.forEach((s,si)=>{const o=owner(d,s.k),p=PEOPLE[o];tal[o]++;
      rows[si]+=`<td class="${p.c} ${nowD?'now':''}" data-d="${iso(d)}" data-s="${s.k}">
        ${isLocked(d,s.k)?'<span class="tdlk">🔒</span>':''}${p.e}</td>`;});}
  $("weekGrid").innerHTML=head+"</tr>"+rows.map(r=>r+"</tr>").join("");
  $("tally").innerHTML=L().tally(tal);$("legend").textContent=L().legend;}
let pt=null,lp=false,pe=null;
document.addEventListener("pointerdown",e=>{const el=e.target.closest(".cell[data-d],td[data-d]");if(!el)return;pe=el;lp=false;
  pt=setTimeout(()=>{lp=true;toggleLock(new Date(el.dataset.d+"T00:00:00"),el.dataset.s);},500);});
document.addEventListener("pointerup",e=>{clearTimeout(pt);const el=e.target.closest(".cell[data-d],td[data-d]");if(!el)return;
  if(lp){lp=false;return;}if(el!==pe)return;const d=new Date(el.dataset.d+"T00:00:00"),sk=el.dataset.s;
  if(isLocked(d,sk)){el.classList.remove("nope");void el.offsetWidth;el.classList.add("nope");return;}toggle(d,sk);});
document.addEventListener("pointercancel",()=>clearTimeout(pt));
document.querySelectorAll("[data-wkrel]").forEach(b=>b.onclick=()=>{weekOffset+=parseInt(b.dataset.wkrel,10);renderDuty();});
$("wkLabel").onclick=()=>{weekOffset=0;renderDuty();};

const saveAn=a=>sv(ANI,a);
const anChkKey=id=>"fam.anchk."+iso(new Date())+"|"+id;
const anDone=id=>localStorage.getItem(anChkKey(id))==="1";
function anToggle(id){anDone(id)?localStorage.removeItem(anChkKey(id)):localStorage.setItem(anChkKey(id),"1");renderDaily();}
function renderDaily(){$("addDaily").textContent=L().addDaily;$("h_daily").textContent=L().daily+" "+CHILD();
  const a=anItems();
  $("dailyList").innerHTML=a.length?a.map(it=>{const dn=anDone(it.id);
    return `<div class="chk${dn?' done':''}" data-dk="${it.id}"><span class="box">${dn?'✓':''}</span>
      <span class="nm">${it.t}</span><span class="ic" data-ded="${it.id}">✏️</span><span class="ic" data-ddel="${it.id}">✕</span></div>`;}).join("")
    :`<div class="empty">${L().nohist==='Chưa có bản ghi hôm nay.'?'Chưa có việc — bấm ＋ để thêm.':'Noch keine Aufgaben — ＋ zum Hinzufügen.'}</div>`;}

/* ============ Việc định kỳ (chores.* — tương thích /lich) ============ */
const CHI="fam.chores";
const chores=()=>ld(CHI);
const saveChores=a=>sv(CHI,a);
const choreKey=id=>"fam.chore."+id;
const choreLast=id=>localStorage.getItem(choreKey(id));
function everyLabel(d){const u=LANG==="vi"?["tháng","tuần","ngày"]:["Monate","Wochen","Tage"];
  if(d%30===0)return (d/30)+" "+u[0];if(d%7===0)return (d/7)+" "+u[1];return d+" "+u[2];}
function choreLeft(c){const last=choreLast(c.id);if(!last)return null;
  const next=new Date(last+"T00:00:00");next.setDate(next.getDate()+c.days);
  const t0=new Date();t0.setHours(0,0,0,0);return Math.round((next-t0)/864e5);}
function choreDue(c){const l=choreLeft(c);return l===null||l<=0;}
function choreDoneFn(id){const c=chores().find(x=>x.id===id);if(!c)return;
  if(!confirm((LANG==="vi"?"Đã làm xong: ":"Erledigt: ")+c.t+" ?\n"+(LANG==="vi"?"Ẩn và nhắc lại sau ":"Ausblenden, erneut nach ")+everyLabel(c.days)+"."))return;
  localStorage.setItem(choreKey(id),iso(new Date()));renderChores();}
let manageCh=false;
function askTier(def){return parseInt(prompt(LANG==="vi"?"Mức độ: 1 = quan trọng, 2 = bảo trì nhà":"Stufe: 1 = wichtig, 2 = Hauspflege",def),10)===1?1:2;}
function addChore(){const t=prompt(LANG==="vi"?"Tên việc định kỳ mới:":"Neue wiederkehrende Aufgabe:");if(!t||!t.trim())return;
  const n=parseInt(prompt(LANG==="vi"?"Lặp lại mỗi bao nhiêu NGÀY? (7=1 tuần · 14=2 tuần · 30=1 tháng):":"Wiederholung alle wie viele TAGE? (7=1 Woche · 30=1 Monat):"),10);
  if(!n||n<1){alert(LANG==="vi"?"Số ngày không hợp lệ":"Ungültige Tageszahl");return;}
  const tier=askTier("2");const a=chores();a.push({id:"c"+Date.now(),t:t.trim(),days:n,tier});saveChores(a);renderChores();}
function editChore(id){const a=chores(),c=a.find(x=>x.id===id);if(!c)return;
  const t=prompt(LANG==="vi"?"Sửa tên việc:":"Name bearbeiten:",c.t);if(t===null)return;if(t.trim())c.t=t.trim();
  const n=parseInt(prompt(LANG==="vi"?"Lặp lại mỗi bao nhiêu ngày:":"Wiederholung alle wie viele Tage:",c.days),10);if(n&&n>=1)c.days=n;
  c.tier=askTier(c.tier||1);saveChores(a);renderChores();}
function delChore(id){if(!confirm(LANG==="vi"?"Xoá việc định kỳ này?":"Diese Aufgabe löschen?"))return;
  saveChores(chores().filter(x=>x.id!==id));localStorage.removeItem(choreKey(id));renderChores();}
function renderChores(){$("h_chores").textContent=L().chores;
  const all=chores(),tierName=t=>t===1?L().tier1:L().tier2;
  $("choreMng").textContent=manageCh?L().choreMngDone:L().choreMng;
  if(manageCh){
    const sorted=all.slice().sort((a,b)=>(a.tier||1)-(b.tier||1));
    $("choreList").innerHTML=(sorted.map(c=>{const l=choreLeft(c);
      const st=l===null?(LANG==="vi"?"chưa làm":"noch nie"):l<=0?'<b style="color:var(--o)">'+(LANG==="vi"?"TỚI HẠN":"FÄLLIG")+'</b>':(LANG==="vi"?"còn "+l+" ngày":"in "+l+" Tagen");
      return `<div class="chk"><span class="nm">${c.t}<div class="sub" style="font-size:12px;color:var(--mut)">[${tierName(c.tier||1)}] · ${LANG==="vi"?"mỗi":"alle"} ${everyLabel(c.days)} · ${st}</div></span>
        <span class="ic" data-choreedit="${c.id}">✏️</span><span class="ic" data-choredel="${c.id}">✕</span></div>`;}).join("")||`<div class="empty">${L().noDue}</div>`)
      +`<button class="add" data-choreadd="1">${LANG==="vi"?"＋ Thêm việc định kỳ":"＋ Aufgabe hinzufügen"}</button>`;
  }else{
    const due=all.filter(choreDue),lv=c=>{const l=choreLeft(c);return l===null?0:l;};
    const sortf=(a,b)=>lv(a)-lv(b)||a.days-b.days;
    const due1=due.filter(c=>(c.tier||1)===1).sort(sortf),due2=due.filter(c=>(c.tier||1)===2).sort(sortf);
    const card=(c,m)=>`<div class="chore${m?' t2':''}" data-chore="${c.id}"><span class="box">○</span>
      <span class="nm">${c.t}<div class="sub">${LANG==="vi"?"mỗi":"alle"} ${everyLabel(c.days)} · ${LANG==="vi"?"chạm khi xong":"antippen wenn fertig"}</div></span></div>`;
    let h="";if(due1.length)h+=due1.map(c=>card(c,false)).join("");

const dd=d=>d.split("-").reverse().join(".");
function isoWeek(ds){const d=new Date(ds+"T00:00:00");const t=new Date(d);t.setHours(0,0,0,0);
  t.setDate(t.getDate()+3-((d.getDay()+6)%7));const w1=new Date(t.getFullYear(),0,4);
  return 1+Math.round(((t-w1)/864e5-3+((w1.getDay()+6)%7))/7);}
function acariMissed(){const items=anItems(),a=items.find(it=>/acarizax/i.test(it.t||""));if(!a)return [];
  const used={},taken={},today=iso(new Date());
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);
    if(k&&k.indexOf("fam.anchk.")===0){const [date,id]=k.slice(10).split("|");used[date]=1;if(id===a.id)taken[date]=1;}}
  return Object.keys(used).filter(d=>d<today&&!taken[d]).sort();}

  const wkKeys=Object.keys(wk).map(Number).sort((a,b)=>a-b).slice(-6);const mx=Math.max(1,...wkKeys.map(k=>wk[k]));
  const rows=noses.length?noses.slice().reverse().map(x=>`<tr><td>${dd(x.date)}</td><td>${x.amount}</td><td>${x.duration}${x.side?" / "+x.side:""}</td></tr>`).join("")

    <div style="color:var(--mut);font-size:13px;margin-bottom:10px">Erstellt am ${dd(iso(new Date()))} · gesamter Verlauf</div>
    <b>Nasenbluten / Woche</b>
    ${wkKeys.length?`<div class="bars">${wkKeys.map(k=>`<div class="b" style="height:${Math.round(wk[k]/mx*78)+6}px"><span>KW${k}</span></div>`).join("")}</div>`:`<p style="color:var(--mut);font-size:13px">— keine —</p>`}
    <b>Nasenbluten – Einträge</b>
    <table style="width:100%;border-collapse:collapse;margin:8px 0 14px"><tr><th>Datum</th><th>Menge</th><th>Dauer</th></tr>${rows}</table>
    <b>Acarizax — vergessene Tage</b>
    <p style="font-size:13px">${missed.length?'<b style="color:var(--r)">'+missed.map(dd).join(", ")+'</b>':"keine erfasst"}</p>

    <div class="acts"><button class="cancel" id="cCancel">${L().cancel}</button><button class="save" style="background:#4f46e5;color:#fff" onclick="csvExport()">⬇️ CSV</button><button class="save" onclick="printReport()">🖨️ PDF A4</button></div></div>`);
  $("cCancel").onclick=close;}
function buildPrintHtml(){
  const H=ld("fam.health.logs"),noses=H.filter(x=>x.type==="nose"),pains=H.filter(x=>x.type==="pain");
  const temps=ld("fam.temp"),sleeps=ld("fam.sleep"),grows=ld("fam.growth"),missed=acariMissed();
  const tbl=(head,rows)=>rows.length?`<table><tr>${head.map(h=>`<th>${h}</th>`).join("")}</tr>${rows.join("")}</table>`:`<p style="color:#666">— keine Einträge —</p>`;

   <h3>Schmerzen</h3>${tbl(["Datum","Körperteil","Stärke","Notiz"],pains.map(x=>`<tr><td>${dd(x.date)}</td><td>${x.part}</td><td>${x.level}/5</td><td>${x.note||""}</td></tr>`))}

   <h3>Temperatur</h3>${tbl(["Datum","°C","Hinweis","Notiz"],temps.map(x=>`<tr><td>${dd(x.date)}</td><td>${x.v}</td><td>${x.v>=38?"Fieber":""}</td><td>${x.note||""}</td></tr>`))}
   <h3>Schlaf</h3>${tbl(["Datum","Dauer","Bett→Auf","Qualität"],sleeps.map(x=>`<tr><td>${dd(x.date)}</td><td>${durH(x.bed,x.wake)||""} h</td><td>${x.bed||""}→${x.wake||""}</td><td>${x.quality||""}</td></tr>`))}
   <h3>Wachstum</h3>${tbl(["Datum","Größe","Gewicht"],grows.map(x=>`<tr><td>${dd(x.date)}</td><td>${x.h||""} cm</td><td>${x.w||""} kg</td></tr>`))}`;}

function csvExport(){
  const rows=[["Datum","Kategorie","Wert","Detail","Notiz"]];
  ld("fam.health.logs").forEach(x=>{
    if(x.type==="nose")rows.push([x.date,"Nasenbluten",x.amount,x.duration+(x.side?" / "+x.side:""),x.note||""]);
    else if(x.type==="pain")rows.push([x.date,"Schmerz",x.part,"Stärke "+x.level,x.note||""]);
    else rows.push([x.date,"Stimmung",x.mood,"",x.note||""]);});
  ld("fam.temp").forEach(x=>rows.push([x.date,"Temperatur",x.v+"°C",x.v>=38?"Fieber":"",x.note||""]));
  ld("fam.sleep").forEach(x=>rows.push([x.date,"Schlaf",(durH(x.bed,x.wake)||"")+" h",(x.bed||"")+"-"+(x.wake||""),(x.quality||"")+(x.note?" / "+x.note:"")]));
  ld("fam.growth").forEach(x=>rows.push([x.date,"Wachstum",(x.w||"")+" kg",(x.h||"")+" cm",""]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\r\n");
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="Gesundheitsbericht_"+iso(new Date())+".csv";a.click();}

const GKEY="fam.game", DELTA={cn:-2,n:-1,bt:0,h:1,ch:2};
function gstate(){const v=localStorage.getItem(GKEY);if(v){try{const s=JSON.parse(v);if(!s.gumLog)s.gumLog=[];if(!s.scores)s.scores=[];return s;}catch(e){}}
  const s={start:iso(new Date()),initial:0,scores:[],gum:0,gumLog:[]};localStorage.setItem(GKEY,JSON.stringify(s));return s;}
function gsave(s){localStorage.setItem(GKEY,JSON.stringify(s));}
const gElapsed=s=>Math.max(0,Math.round((new Date(iso(new Date())+"T00:00:00")-new Date(s.start+"T00:00:00"))/864e5));
const gAdj=s=>s.scores.reduce((a,e)=>a+e.delta,0);
function scoreToday(k){const s=gstate(),t=iso(new Date());s.scores=s.scores.filter(e=>e.date!==t);s.scores.push({date:t,key:k,delta:DELTA[k]});gsave(s);renderGame();}
const todayScore=s=>s.scores.find(e=>e.date===iso(new Date()));
function renderGame(){const s=gstate(),active=s.initial>0,raw=s.initial-gElapsed(s)+gAdj(s),tr=todayScore(s);
  $("h_game").textContent=L().game;$("gameUnit").textContent=L().gameUnit;$("critBtn").textContent=L().critBtn;$("gSetDays").textContent=L().gSetDays;
  $("gameDays").textContent=active?Math.max(0,raw):"–";
  $("gameBreak").innerHTML=active?L().gbreak(s.initial,gElapsed(s),gAdj(s)):L().gNotSet;
  $("doneMsg").style.display=(active&&raw<=0)?"block":"none";$("doneMsg").textContent=L().done;
  $("gameBtns").innerHTML=L().ratings.map(r=>`<button class="gbtn g_${r[0]}${tr&&tr.key===r[0]?' sel':''}" data-score="${r[0]}">${r[1]}<br>${r[2]}</button>`).join("");
  $("gameStatus").textContent=L().gameStatus(tr?L().ratings.find(r=>r[0]===tr.key)[1]:null);}
function gSetDaysFn(){const v=prompt(L().gSetAsk,"42");if(v===null)return;const n=parseInt(v,10);if(isNaN(n))return;
  const s=gstate();s.start=iso(new Date());s.initial=Math.max(0,n);s.scores=[];gsave(s);renderGame();}
function renderGum(){const s=gstate();$("h_gum").textContent=L().gum;$("gumUnit").textContent=L().gumUnit;
  $("gumNum").textContent=s.gum;$("gTest").textContent=L().gTest;$("gKonig").textContent=L().gKonig;$("gPay").textContent=L().gPay;
  $("gPlus").textContent=L().gPlus;$("gMinus").textContent=L().gMinus;$("gSetGum").textContent=L().gSetGum;$("gumLogT").textContent=L().gumLogT;
  $("gumLog").innerHTML=(s.gumLog||[]).slice().reverse().slice(0,12).map(e=>`<div class="row" style="color:${e.delta>0?'var(--g)':'var(--r)'}">${dmy(e.date)} · ${e.delta>0?'+':''}${e.delta} 🍬 — ${e.reason||''}</div>`).join("")||`<div class="row" style="color:var(--mut)">${L().nohist}</div>`;}
function addGum(n,reason){const s=gstate();s.gum=Math.max(0,s.gum+n);s.gumLog.push({date:iso(new Date()),delta:n,reason:reason||""});gsave(s);renderGum();}
function payGum(){const v=prompt(L().gPayAsk,"1");if(v===null)return;const n=Math.abs(parseInt(v,10));if(n)addGum(-n,L().gReasonPay);}

function bindPick(cb){sheet.querySelectorAll("[data-pk]").forEach(c=>c.onclick=()=>{sheet.querySelectorAll("[data-pk]").forEach(x=>x.classList.remove("sel"));c.classList.add("sel");cb(c.dataset.pk);});}
function durH(bed,wake){if(!bed||!wake)return null;const[bh,bm]=bed.split(":").map(Number),[wh,wm]=wake.split(":").map(Number);
  let m=(wh*60+wm)-(bh*60+bm);if(m<0)m+=1440;return(m/60).toFixed(1);}
function renderSleep(){$("h_sleep").textContent=SL().sleep;$("addSleep").textContent=SL().addSleep;
  const a=ld("fam.sleep").slice(-5).reverse();
  $("sleepList").innerHTML=a.length?a.map(x=>`<div class="row">😴 ${dmy(x.date)} · ${x.bed||"–"}→${x.wake||"–"}${durH(x.bed,x.wake)?` · ${durH(x.bed,x.wake)}${SL().dur}`:""}${x.quality?` · ${x.quality}`:""}${x.note?` — "${x.note}"`:""}</div>`).join(""):`<div class="row">${SL().none}</div>`;}
function openSleep(){let q=null;
  open(`<h3>${SL().sleep}</h3><div class="lbl">${SL().bed}</div><input id="sBed" type="time" value="21:00">
   <div class="lbl">${SL().wake}</div><input id="sWake" type="time" value="07:00">
   <div class="lbl">${SL().quality}</div>${pickRow(SL().qualities)}<textarea id="sNote" placeholder="${SL().note}"></textarea>`+actBtns());
  bindPick(v=>q=v);$("cC").onclick=close;
  $("cS").onclick=()=>{const a=ld("fam.sleep");a.push({date:iso(new Date()),bed:$("sBed").value,wake:$("sWake").value,quality:q,note:$("sNote").value.trim()});sv("fam.sleep",a);renderSleep();close();};}
function renderTemp(){$("h_temp").textContent=SL().temp;$("addTemp").textContent=SL().addTemp;
  const a=ld("fam.temp").slice(-8);
  const chart=a.length?`<div class="bars">${a.map(x=>{const h=Math.max(4,Math.round((x.v-35)/6*78));
    return `<div class="b" style="height:${h}px;background:${x.v>=38?'var(--r)':'var(--blue)'}"><span>${x.v}</span></div>`;}).join("")}</div>`:"";
  const list=a.slice().reverse().map(x=>`<div class="row" style="color:${x.v>=38?'var(--r)':'#c7ccd6'}">🌡️ ${dmy(x.date)} · ${x.v}°C${x.v>=38?` (${SL().fever})`:""}${x.note?` — "${x.note}"`:""}</div>`).join("");
  $("tempList").innerHTML=chart+(a.length?list:`<div class="row">${SL().none}</div>`);}
function openTemp(){open(`<h3>${SL().temp}</h3><div class="lbl">${SL().tempVal}</div>
   <input id="tV" type="number" step="0.1" inputmode="decimal" placeholder="37.0"><textarea id="tNote" placeholder="${SL().note}"></textarea>`+actBtns());
  $("cC").onclick=close;$("cS").onclick=()=>{const v=parseFloat($("tV").value);if(v){const a=ld("fam.temp");a.push({date:iso(new Date()),v,note:$("tNote").value.trim()});sv("fam.temp",a);renderTemp();close();}};}
function renderGrowth(){$("h_growth").textContent=SL().growth;$("addGrowth").textContent=SL().addGrowth;
  const a=ld("fam.growth");let chart="";
  if(a.length){const ws=a.map(x=>x.w).filter(Boolean);const mn=Math.min(...ws),mx=Math.max(...ws);
    chart=`<div style="font-size:12px;color:var(--mut);margin:2px 0">${SL().weightL} (kg)</div><div class="bars">${a.slice(-8).map(x=>{const h=mx>mn?Math.round((x.w-mn)/(mx-mn)*68)+8:40;
     return `<div class="b" style="height:${h}px"><span>${x.w}</span></div>`;}).join("")}</div>`;}
  const list=a.slice().reverse().slice(0,5).map(x=>`<div class="row">📈 ${x.date.split("-").reverse().join("/")} · ${x.h||"–"}cm · ${x.w||"–"}kg</div>`).join("");
  $("growthList").innerHTML=chart+(a.length?list:`<div class="row">${SL().none}</div>`);}
function openGrowth(){open(`<h3>${SL().growth}</h3><div class="lbl">${SL().height}</div><input id="gH" type="number" step="0.1" inputmode="decimal" placeholder="125">
   <div class="lbl">${SL().weight}</div><input id="gW" type="number" step="0.1" inputmode="decimal" placeholder="24">`+actBtns());
  $("cC").onclick=close;$("cS").onclick=()=>{const h=parseFloat($("gH").value)||null,w=parseFloat($("gW").value)||null;if(h||w){const a=ld("fam.growth");a.push({date:iso(new Date()),h,w});sv("fam.growth",a);renderGrowth();close();}};}

/* ============ click handlers (CRUD + scores) ============ */
document.addEventListener("click",e=>{
  const sc=e.target.closest("[data-score]");if(sc){scoreToday(sc.dataset.score);return;}
  const ed=e.target.closest("[data-ded]");if(ed){const a=anItems(),it=a.find(x=>x.id===ed.dataset.ded);const t=prompt(LANG==="vi"?"Sửa việc:":"Bearbeiten:",it.t);if(t&&t.trim()){it.t=t.trim();saveAn(a);renderDaily();}return;}
  const dl=e.target.closest("[data-ddel]");if(dl){if(confirm(LANG==="vi"?"Xoá việc này?":"Löschen?")){saveAn(anItems().filter(x=>x.id!==dl.dataset.ddel));localStorage.removeItem(anChkKey(dl.dataset.ddel));renderDaily();}return;}
  const dk=e.target.closest("[data-dk]");if(dk){anToggle(dk.dataset.dk);return;}
  const ch=e.target.closest("[data-chore]");if(ch){choreDoneFn(ch.dataset.chore);return;}
  const cad=e.target.closest("[data-choreadd]");if(cad){addChore();return;}
  const cce=e.target.closest("[data-choreedit]");if(cce){editChore(cce.dataset.choreedit);return;}
  const ccd=e.target.closest("[data-choredel]");if(ccd){delChore(ccd.dataset.choredel);return;}
  const dn=e.target.closest("[data-done]");if(dn){confirmDone(dn.dataset.done);return;}
  const ee=e.target.closest("[data-evedit]");if(ee){editEvent(ee.dataset.evedit);return;}
  const dv=e.target.closest("[data-del]");if(dv){delEvent(dv.dataset.del);return;}
  const cy=e.target.closest("[data-cyc]");if(cy){cyclePerson(cy.dataset.cyc);return;}
  const th=e.target.closest("[data-togglehidden]");if(th){showHidden=!showHidden;renderAppt();return;}
  const un=e.target.closest("[data-undone]");if(un){undone(un.dataset.undone);return;}});
$("addDaily").onclick=()=>{const t=prompt(LANG==="vi"?"Việc hằng ngày mới:":"Neue tägliche Aufgabe:");if(t&&t.trim()){const a=anItems();a.push({id:"a"+Date.now(),t:t.trim()});saveAn(a);renderDaily();}};
$("choreMng").onclick=()=>{manageCh=!manageCh;renderChores();};
$("gTest").onclick=()=>addGum(2,L().gReasonTest);$("gKonig").onclick=()=>addGum(10,L().gReasonKonig);$("gPay").onclick=payGum;
$("gPlus").onclick=()=>gumManual(1);$("gMinus").onclick=()=>gumManual(-1);$("critBtn").onclick=openCrit;$("repBtn").onclick=openReport;
$("gSetDays").onclick=gSetDaysFn;$("gSetGum").onclick=gSetGumFn;
$("addSleep").onclick=openSleep;$("addTemp").onclick=openTemp;$("addGrowth").onclick=openGrowth;

/* ============ Sao lưu + Nhập (backup app này HOẶC export /lich) ============ */
function famDump(){const o={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);
  if(k&&k.indexOf("fam.")===0&&k.indexOf("fam.snap")!==0)o[k]=localStorage.getItem(k);}return o;}
// Nhập thông minh: key "fam.*" giữ nguyên; key "lich.*" đổi tiền tố sang "fam.*" (bỏ lich.pinok).
function famRestore(o){let n=0;Object.keys(o).forEach(k=>{
  if(k.indexOf("fam.")===0){localStorage.setItem(k,o[k]);n++;}
  else if(k.indexOf("lich.")===0){if(k==="lich.pinok")return;localStorage.setItem("fam."+k.slice(5),o[k]);n++;}});
  return n;}
function snaps(){const a=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.indexOf("fam.snap.")===0)a.push(k.slice(9));}return a.sort().reverse();}
function autoSnapshot(){const today=iso(new Date());if(localStorage.getItem("fam.snap_last")===today)return;
  localStorage.setItem("fam.snap."+today,JSON.stringify(famDump()));localStorage.setItem("fam.snap_last",today);
  snaps().slice(7).forEach(d=>localStorage.removeItem("fam.snap."+d));}
function exportFile(){const blob=new Blob([JSON.stringify(famDump(),null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="gia-dinh-backup-"+iso(new Date())+".json";a.click();
  localStorage.setItem("fam.lastexport",iso(new Date()));}
function importFile(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{let o;try{o=JSON.parse(r.result);}catch(e){alert(L().importErr);return;}
    if(!o||typeof o!=="object"){alert(L().importErr);return;}
    const n=famRestore(o);if(!n){alert(L().importNone);return;}renderAll();alert(L().importOk+" ("+n+")");};
  r.readAsText(f);ev.target.value="";}
function renderBackupReminder(){const el=$("backupReminder"),le=localStorage.getItem("fam.lastexport");
  if(!le){el.hidden=false;el.textContent=L().backupNever;return;}
  const days=Math.round((new Date(iso(new Date())+"T00:00:00")-new Date(le+"T00:00:00"))/864e5);
  if(days>=3){el.hidden=false;el.textContent=L().backupRemind(days);}else el.hidden=true;}
function openCog(){
  const last=localStorage.getItem("fam.snap_last");
  const le=localStorage.getItem("fam.lastexport");
  const days=le?Math.round((new Date(iso(new Date())+"T00:00:00")-new Date(le+"T00:00:00"))/864e5):null;
  const warn=(days===null||days>=3);
  const snapList=snaps().slice(0,7).map(d=>`<div class="row" style="display:flex;justify-content:space-between;align-items:center"><span>📦 ${d.split("-").reverse().join("/")}</span><button class="chip" data-restore="${d}">↩</button></div>`).join("")||`<div class="row" style="color:var(--mut)">—</div>`;
  open(`<h3>💾 ${L().backupT}</h3>
    <div style="font-size:13px;color:#c7ccd6;margin-bottom:8px">${L().autoOn}<br>${L().lastSnap}: <b>${last?last.split("-").reverse().join("/"):"–"}</b></div>
    ${warn?`<div class="mockbanner" style="margin:0 0 10px">${L().backupWarn}</div>`:""}
    <div class="acts" style="margin-top:0"><button class="cancel" id="bImp">📂 ${L().importFile}</button><button class="save" id="bExp">⬇️ ${L().exportFile}</button></div>
    <div class="lbl" style="margin-top:14px">${L().pasteT}</div>
    <textarea id="ioBox" placeholder="${L().pastePh}" style="font:12px/1.4 monospace;min-height:96px"></textarea>
    <div class="acts" style="margin-top:8px"><button class="cancel" id="bIoExp">⬆️ ${L().pasteExport}</button><button class="save" id="bIoImp">⬇️ ${L().pasteImport}</button></div>
    <div class="lbl" id="ioStatus" style="min-height:1.2em;text-transform:none;letter-spacing:0;color:var(--g)"></div>
    <button class="notebtn" id="bName" style="margin-top:10px">${L().nameSet} — ${CHILD()}</button>
    <div class="lbl" style="margin-top:14px">${L().snapHist}</div><div class="hist">${snapList}</div>
    <div class="acts"><button class="cancel" id="bClose">${L().cancel}</button></div>`);
  $("bExp").onclick=()=>{exportFile();renderBackupReminder();openCog();};
  $("bImp").onclick=()=>$("impFile").click();
  $("bIoExp").onclick=()=>{$("ioBox").value=JSON.stringify(famDump(),null,2);$("ioBox").select();
    localStorage.setItem("fam.lastexport",iso(new Date()));renderBackupReminder();$("ioStatus").style.color="var(--g)";$("ioStatus").textContent=L().pasteCopied;};
  $("bIoImp").onclick=()=>{const v=$("ioBox").value.trim();
    if(!v){$("ioStatus").style.color="var(--o)";$("ioStatus").textContent=L().pasteEmpty;return;}
    let o;try{o=JSON.parse(v);}catch(e){$("ioStatus").style.color="var(--r)";$("ioStatus").textContent=L().importErr;return;}
    if(!o||typeof o!=="object"){$("ioStatus").style.color="var(--r)";$("ioStatus").textContent=L().importErr;return;}
    const n=famRestore(o);if(!n){$("ioStatus").style.color="var(--r)";$("ioStatus").textContent=L().importNone;return;}
    renderAll();$("ioStatus").style.color="var(--g)";$("ioStatus").textContent=L().pasteOk(n);};
  $("bName").onclick=()=>{const v=prompt(L().nameAsk,CHILD());if(v!==null){if(v.trim())localStorage.setItem("fam.childname",v.trim());else localStorage.removeItem("fam.childname");renderAll();openCog();}};
  $("bClose").onclick=close;
  sheet.querySelectorAll("[data-restore]").forEach(b=>b.onclick=()=>{if(confirm(L().restoreAsk)){const s=localStorage.getItem("fam.snap."+b.dataset.restore);if(s){famRestore(JSON.parse(s));renderAll();}close();}});}

/* ============ Acarizax sắp hết (tự nhắc) ============ */
function acari(){const v=localStorage.getItem("fam.acari");if(v){try{return JSON.parse(v)}catch(e){}}return null;}
function acariRemain(s){if(!s)return 0;const days=Math.max(0,Math.round((new Date(iso(new Date())+"T00:00:00")-new Date(s.since+"T00:00:00"))/864e5));return Math.max(0,s.count-(s.perDay||2)*days);}
const acariDaysLeft=s=>s?Math.floor(acariRemain(s)/(s.perDay||2)):0;
function renderAcari(){const s=acari();$("h_acari").textContent=L().acariH;$("acariUnit").textContent=L().acariUnit;
  $("acariBuy").textContent=s?L().acariBuy:L().acariSet;
  $("acariDays").textContent=s?acariDaysLeft(s):"–";
  $("acariBreak").textContent=s?L().acariBreak(acariRemain(s),s.perDay||2):L().acariSetup;}
function renderAcariReminder(){const el=$("acariReminder"),s=acari();
  if(s&&acariDaysLeft(s)<=14){el.hidden=false;el.textContent=L().acariRemind(acariDaysLeft(s));}else el.hidden=true;}
function acariBuyFn(){const s0=acari();const v=prompt(L().acariAsk,"4");if(v===null)return;const boxes=parseFloat(v);if(!boxes)return;
  const ppb=parseFloat(prompt(L().acariPpb,"30"))||30;
  let perDay=s0?(s0.perDay||2):2;if(!s0){const pd=parseFloat(prompt(L().acariPerDay,"2"));if(pd&&pd>0)perDay=pd;}
  const s={count:Math.round(boxes*ppb)+acariRemain(s0),perDay,since:iso(new Date())};
  localStorage.setItem("fam.acari",JSON.stringify(s));renderAll();}

/* ============ language + render all ============ */
document.querySelectorAll("[data-lang]").forEach(b=>b.onclick=()=>{LANG=b.dataset.lang;localStorage.setItem("fam.lang",LANG);
  document.querySelectorAll("[data-lang]").forEach(x=>x.classList.toggle("on",x.dataset.lang===LANG));renderAll();});
function renderAll(){
  $("footNote").textContent=L().foot;
  $("tab_truc").textContent=L().tab_truc;$("tab_lich").textContent=L().tab_lich;$("tab_con").textContent=L().tab_con;$("tab_health").textContent=L().tab_health;
  $("h_today").textContent=L().today+" "+CHILD();$("h_week").textContent=L().week;
  $("repBtn").textContent=L().repBtn;$("h_report").textContent=L().report;
  renderDuty();renderDaily();renderChores();renderAppt();renderHealth();renderGame();renderGum();renderSleep();renderTemp();renderGrowth();renderAcari();renderAcariReminder();renderBackupReminder();}
document.querySelectorAll("[data-lang]").forEach(x=>x.classList.toggle("on",x.dataset.lang===LANG));
autoSnapshot();renderAll();setTab(TAB);
$("cog").onclick=openCog;$("backupReminder").onclick=openCog;$("impFile").addEventListener("change",importFile);
$("acariBuy").onclick=acariBuyFn;$("acariReminder").onclick=()=>setTab("health");
setInterval(renderDuty,60000);
</script>
